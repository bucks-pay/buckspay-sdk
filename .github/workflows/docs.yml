name: docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # .d.ts must exist for typedoc + the examples type-check imports the built packages.
      - run: pnpm -r build
      - run: pnpm docs:typecheck
      - run: pnpm docs:links
      - run: pnpm docs:api
