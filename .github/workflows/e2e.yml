name: e2e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      # Unit-runnable e2e config tests always run (network tests skip without secrets).
      - run: pnpm e2e
        env:
          BUCKSPAY_E2E: "1"
          FACILITATOR_URL: ${{ secrets.FACILITATOR_URL }}
          FACILITATOR_API_KEY: ${{ secrets.FACILITATOR_API_KEY }}
          E2E_PAYER_SECRET: ${{ secrets.E2E_PAYER_SECRET }}
          E2E_MERCHANT_G: ${{ secrets.E2E_MERCHANT_G }}
          E2E_USDC_TESTNET_SAC: ${{ secrets.E2E_USDC_TESTNET_SAC }}
          E2E_SPONSOR_G: ${{ secrets.E2E_SPONSOR_G }}

  # secrets are not allowed in a job-level `if`, so a tiny gate job reads it into an output.
  secrets-gate:
    runs-on: ubuntu-latest
    outputs:
      has_facilitator: ${{ steps.check.outputs.has_facilitator }}
    steps:
      - id: check
        run: echo "has_facilitator=${{ secrets.FACILITATOR_API_KEY != '' }}" >> "$GITHUB_OUTPUT"

  web:
    runs-on: ubuntu-latest
    needs: secrets-gate
    # Only where the facilitator secret exists; forks and unconfigured repos skip cleanly.
    if: needs.secrets-gate.outputs.has_facilitator == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm --filter @buckspay/e2e exec playwright install --with-deps chromium
      - run: pnpm e2e:web
        env:
          BUCKSPAY_E2E: "1"
          FACILITATOR_URL: ${{ secrets.FACILITATOR_URL }}
          FACILITATOR_API_KEY: ${{ secrets.FACILITATOR_API_KEY }}
          VITE_SPONSOR_G: ${{ secrets.E2E_SPONSOR_G }}
          VITE_USDC_SAC: ${{ secrets.E2E_USDC_TESTNET_SAC }}
          VITE_MERCHANT_G: ${{ secrets.E2E_MERCHANT_G }}
